# Publishes the Vite production bundle from dist/.
# Do not use GitHub’s Jekyll static-site workflow for this repo—it ships raw sources and breaks the app.

name: Deploy to GitHub Pages

on:
    push:
        branches: [main, react]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - uses: actions/setup-node@v6
              with:
                  node-version: "22"
                  cache: npm

            - name: Install and build (Vite → dist/)
              run: |
                  npm ci
                  npm run build

            - uses: actions/upload-pages-artifact@v5
              with:
                  path: dist

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4.0.5
